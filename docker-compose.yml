version: "3.9"

services:
  openclaw:
    build: ./openclaw
    container_name: openclaw
    environment:
      # 如果它需要 LLM Provider（按你实际用的）
      # 如果用云端 LLM，需要 Key
      OPENAI_API_KEY: ${OPENAI_API_KEY}        # 从宿主机环境变量读取
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY} # 同上
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}

      # 强烈建议：关闭非必要外联
      OPENCLAW_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    volumes:
      - openclaw_data:/root/.openclaw
      - ./workspace:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: unless-stopped
    # ⚠️ 没有 ports → 不暴露公网

volumes:
  openclaw_data:

